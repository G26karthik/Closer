version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      google-sdk:
        patterns: ["google-*"]
      fastapi-stack:
        patterns: ["fastapi", "uvicorn", "pydantic"]
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
