steps:
  - name: 'python:3.12-slim'
    entrypoint: sh
    args:
      - -c
      - 'pip install --quiet ruff && ruff check .'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/closer:$BUILD_ID', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/closer:$BUILD_ID']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - closer
      - --image=gcr.io/$PROJECT_ID/closer:$BUILD_ID
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --set-env-vars=FIRESTORE_PROJECT_ID=$PROJECT_ID,FIREBASE_AUTH_DOMAIN=$PROJECT_ID.firebaseapp.com,GEMINI_API_KEY=$_GEMINI_API_KEY,GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET=$_GOOGLE_CLIENT_SECRET,FIREBASE_API_KEY=$_FIREBASE_API_KEY,CLOUD_RUN_SERVICE_URL=$_CLOUD_RUN_SERVICE_URL

images:
  - 'gcr.io/$PROJECT_ID/closer:$BUILD_ID'
